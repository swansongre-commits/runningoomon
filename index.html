<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>런닝구몬 · runningoomon</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    background: #f7f7f7;
    font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
    -webkit-user-select: none; user-select: none;
    overflow: hidden;
    touch-action: none;
  }
  #wrap {
    display: flex; flex-direction: column; align-items: center;
    gap: 12px; padding: 8px;
    width: 100%; margin: 0 auto;   /* PC에서도 브라우저 가로폭 100% 사용 */
  }
  #stage {
    position: relative;
    width: 100%;
  }
  #gameCanvas {
    background: #ffffff;
    border: 3px solid #535353;
    border-radius: 10px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.12);
    display: block;
    width: 100%;
    height: auto;
    aspect-ratio: 800 / 320;
    touch-action: none;
    outline: none;
  }

  /* 수학 퀴즈 오버레이 */
  #quiz {
    position: absolute; inset: 0;
    display: none;
    align-items: center; justify-content: center;
    border-radius: 10px;
    background: rgba(20,28,40,0.55);
    backdrop-filter: blur(2px);
  }
  #quiz.show { display: flex; }
  .quiz-card {
    width: 86%; max-width: 460px;
    background: #fff; border-radius: 18px;
    padding: 30px 24px 22px;
    box-shadow: 0 18px 50px rgba(0,0,0,0.35);
    text-align: center;
    font-family: 'Malgun Gothic', sans-serif;
    line-height: 1.4;
    animation: pop .28s cubic-bezier(.2,1.3,.5,1);
  }
  @keyframes pop { from { transform: scale(.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .quiz-stage { font-size: 20px; font-weight: 800; color: #2e8b57; line-height: 1.3; margin-bottom: 10px; }
  .quiz-sub { font-size: 13px; color: #888; margin: 0 0 18px; line-height: 1.45; }
  .quiz-sub b { color: #c2682f; }
  .quiz-expr {
    font-size: 38px; font-weight: 800; color: #333;
    font-family: 'Consolas', monospace; margin-bottom: 14px;
    letter-spacing: 1px;
  }
  #quizInput {
    width: 70%; max-width: 240px;
    font-size: 30px; text-align: center;
    padding: 8px 10px; border: 3px solid #cfd6e0; border-radius: 12px;
    outline: none; font-family: 'Consolas', monospace;
  }
  #quizInput:focus { border-color: #2e8b57; }
  .quiz-row { display: flex; gap: 10px; justify-content: center; margin-top: 14px; }
  #quizSubmit {
    border: none; border-radius: 12px; padding: 14px 30px;
    font-size: 18px; font-weight: 800; color: #fff; background: #2e8b57;
    box-shadow: 0 4px 0 #246e45; cursor: pointer; font-family: 'Malgun Gothic', sans-serif;
  }
  #quizSubmit:active { transform: translateY(3px); box-shadow: 0 1px 0 #246e45; }
  .quiz-timer {
    margin-top: 14px; font-size: 14px; color: #999;
  }
  .quiz-timer b { color: #d9534f; font-size: 18px; }

  /* 게임오버 / 랭킹 오버레이 */
  #gameover {
    position: absolute; inset: 0; z-index: 25; display: none;
    align-items: center; justify-content: center;
    background: rgba(20,28,40,0.62); border-radius: 10px;
    font-family: 'Malgun Gothic', sans-serif;
  }
  #gameover.show { display: flex; }
  .go-card {
    width: 88%; max-width: 420px; background: #fff; border-radius: 18px;
    padding: 22px 20px 20px; text-align: center; box-shadow: 0 18px 50px rgba(0,0,0,0.4);
    animation: pop .25s cubic-bezier(.2,1.3,.5,1);
    line-height: 1.45;
  }
  .go-title { font-size: 30px; font-weight: 900; color: #d9534f; letter-spacing: 1px; margin-bottom: 6px; }
  .go-score { font-size: 16px; color: #555; margin: 4px 0 12px; }
  .go-score b { color: #2b2b2b; font-family: 'Consolas', monospace; }
  .go-label { font-size: 13px; color: #888; margin-bottom: 8px; }
  #goName {
    width: 80%; max-width: 240px; font-size: 22px; text-align: center;
    padding: 8px 10px; border: 3px solid #cfd6e0; border-radius: 12px; outline: none;
  }
  #goName:focus { border-color: #2e8b57; }
  .go-row { display: flex; gap: 10px; justify-content: center; margin-top: 12px; }
  .go-card button {
    border: none; border-radius: 12px; padding: 12px 22px; font-size: 16px; font-weight: 800;
    color: #fff; background: #2e8b57; box-shadow: 0 4px 0 #246e45; cursor: pointer;
    font-family: 'Malgun Gothic', sans-serif;
  }
  .go-card button:active { transform: translateY(3px); box-shadow: 0 1px 0 #246e45; }
  .go-card button.ghost { background: #6b7686; box-shadow: 0 4px 0 #525c69; }
  .go-skip { margin-top: 10px; font-size: 12px; color: #aaa; text-decoration: underline; cursor: pointer; }
  .go-rank-title { font-size: 18px; font-weight: 800; color: #2e8b57; margin-bottom: 8px; }
  #goRankList { list-style: none; margin: 0 auto; padding: 0; max-width: 320px; }
  #goRankList li {
    display: flex; align-items: center; gap: 8px; padding: 5px 10px; border-radius: 8px;
    font-size: 15px; color: #444;
  }
  #goRankList li:nth-child(odd) { background: #f5f5f5; }
  #goRankList li.me { background: #fff3cd; font-weight: 800; color: #222; outline: 2px solid #ffce54; }
  #goRankList li .r { width: 30px; text-align: center; }
  #goRankList li .n { flex: 1; text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #goRankList li .s { font-family: 'Consolas', monospace; font-weight: 700; }
  .go-msg { font-size: 13px; color: #888; margin: 10px 0 2px; }

  /* 캔버스 위 오버레이 터치 컨트롤 */
  #touchUI { position: absolute; inset: 0; pointer-events: none; display: none; z-index: 10; }
  .ovbtn {
    position: absolute; pointer-events: auto;
    border: none; border-radius: 50%; color: #fff; font-weight: 800;
    font-family: 'Malgun Gothic', sans-serif; line-height: 1.05;
    background: rgba(74,111,165,0.85); box-shadow: 0 3px 10px rgba(0,0,0,0.3);
    -webkit-user-select: none; user-select: none; touch-action: manipulation; cursor: pointer;
    display: flex; align-items: center; justify-content: center; text-align: center;
  }
  .ovbtn:active { transform: scale(0.92); }
  .ovbtn.nav  { width: 13%; max-width: 64px; aspect-ratio: 1; top: 44%; font-size: 24px; }
  .ovbtn.prev { left: 3%; }
  .ovbtn.next { right: 3%; }
  .ovbtn.duck { width: 16%; max-width: 92px; aspect-ratio: 1; right: 3%; bottom: 7%; font-size: 14px; background: rgba(194,104,47,0.9); }

  /* 가로로 돌리기 안내 */
  #rotate {
    position: absolute; inset: 0; z-index: 30; display: none;
    flex-direction: column; align-items: center; justify-content: center; gap: 10px;
    background: rgba(20,28,40,0.92); color: #fff; border-radius: 10px;
    font-family: 'Malgun Gothic', sans-serif; text-align: center; font-size: 18px;
  }
  #rotate b { color: #ffd54f; }
  #rotate .rot-icon { font-size: 54px; animation: rot 1.8s ease-in-out infinite; }
  #rotate .rot-sub { font-size: 13px; color: #b9c2cf; }
  @keyframes rot { 0%,100%{transform:rotate(0);} 50%{transform:rotate(90deg);} }

  /* 터치 기기: 오버레이 노출 + 상태별 표시 */
  @media (hover: none) and (pointer: coarse) {
    #touchUI { display: block; }
    #stage[data-mode="menu"] .ovbtn.duck { display: none; }
    #stage[data-mode="play"] .ovbtn.nav  { display: none; }
    #stage[data-mode="busy"] .ovbtn,
    #stage[data-mode="over"] .ovbtn { display: none; }
    .hint .desktop-only { display: none; }
    .hint .touch-only { display: inline !important; }
  }
  /* 모바일 세로 → 가로 안내 */
  @media (pointer: coarse) and (orientation: portrait) { #rotate { display: flex; } }
  /* 모바일 가로 → 화면을 더 넓게 */
  @media (pointer: coarse) and (orientation: landscape) {
    #wrap { padding: 4px; gap: 6px; }
    #stage { max-width: none; }
    .hint { font-size: 11px; line-height: 1.3; }
  }

  .hint { color: #777; font-size: 13px; text-align: center; line-height: 1.6; }
  .hint b { color: #444; }
</style>
</head>
<body>
<div id="wrap">
  <div id="stage">
    <canvas id="gameCanvas" width="800" height="320" tabindex="0"></canvas>
    <div id="quiz">
      <div class="quiz-card">
        <div class="quiz-stage" id="quizStage">STAGE 1 클리어!</div>
        <div class="quiz-sub">정답이면 점수 <b>×2</b>, 틀리면 점수 그대로 유지!</div>
        <div class="quiz-expr" id="quizExpr">3 + 5 = ?</div>
        <input id="quizInput" inputmode="numeric" pattern="[0-9]*" autocomplete="off" placeholder="?">
        <div class="quiz-row">
          <button id="quizSubmit">제출</button>
        </div>
        <div class="quiz-timer">남은 시간 <b id="quizTimer">15</b>초</div>
      </div>
    </div>

    <!-- 캔버스 위 오버레이 터치 컨트롤 (가로모드에서 세로 공간 절약) -->
    <div id="touchUI">
      <button class="ovbtn nav prev" id="btnPrev" aria-label="이전 캐릭터">◀</button>
      <button class="ovbtn nav next" id="btnNext" aria-label="다음 캐릭터">▶</button>
      <button class="ovbtn duck" id="btnDuck">⬇<br>숙이기</button>
    </div>

    <!-- 세로일 때 가로로 돌리기 안내 -->
    <div id="rotate">
      <div class="rot-icon">📱</div>
      <div>화면을 <b>가로</b>로 돌려주세요</div>
      <div class="rot-sub">가로모드에서 더 넓게 즐길 수 있어요</div>
    </div>

    <!-- 게임오버: 이름 입력 → 랭킹 TOP 10 -->
    <div id="gameover">
      <div class="go-card">
        <div class="go-title">GAME OVER</div>
        <div class="go-score">STAGE <b id="goStage">1</b> · 점수 <b id="goScore">00000</b></div>
        <div id="goChoiceView">
          <div class="go-row">
            <button id="goAgain">🔁 다시 시작</button>
            <button id="goEnd" class="ghost">📝 기록남기기</button>
          </div>
        </div>
        <div id="goNameView" style="display:none;">
          <div class="go-label">이름을 입력하고 랭킹에 등록하세요</div>
          <input id="goName" maxlength="8" autocomplete="off" placeholder="이름 (최대 8자)">
          <div class="go-row"><button id="goSubmit">🏆 랭킹 등록</button></div>
          <div class="go-skip" id="goSkip">등록 없이 랭킹 보기</div>
        </div>
        <div id="goRankView" style="display:none;">
          <div class="go-rank-title">🏆 랭킹 TOP 10</div>
          <ol id="goRankList"></ol>
          <div class="go-msg" id="goMsg"></div>
          <div class="go-row">
            <button id="goRestart">다시 시작</button>
            <button id="goMenu" class="ghost">캐릭터 선택</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="hint">
    <span class="desktop-only"><b>스페이스 / ↑ / 클릭</b> 점프 · <b>↓</b> 숙이기 · <b>R</b> 다시 시작 · <b>ESC</b> 캐릭터선택<br>
    시작 화면에서 <b>← →</b> 로 캐릭터 선택 후 <b>스페이스</b>로 시작</span>
    <span style="display:none;" class="touch-only"><b>화면을 탭</b>하면 점프! · <b>⬇</b> 버튼은 숙이기 · 가로모드 권장</span>
  </div>
</div>

<script>
(function () {
  "use strict";

  const canvas = document.getElementById("gameCanvas");
  const ctx = canvas.getContext("2d");
  const stageEl = document.getElementById("stage");
  const W = canvas.width, H = canvas.height;

  const SURFACE_BASE = 240;   // 평지일 때 발이 닿는 기준 y (값이 작을수록 높음)
  const PLAYER_X = 95;        // 플레이어 화면상 고정 x
  const GRAVITY = 0.72;
  const JUMP_V = -13.8;
  const CLOSE_FRAMES = 40, OPEN_FRAMES = 40;

  // ---------- 캐릭터 ----------
  const CHARACTERS = [
    { id: "cat",    name: "고양이",  emoji: "🐱", color: "#e8943a", legs: 4 },
    { id: "rabbit", name: "토끼",    emoji: "🐰", color: "#c9c9d4", legs: 4 },
    { id: "turtle", name: "거북이",  emoji: "🐢", color: "#5aa056", legs: 4 },
    { id: "alien",  name: "외계인",  emoji: "👽", color: "#7fd66b", legs: 2 },
  ];

  // ---------- 상태 ----------
  const STATE = { MENU: 0, PLAY: 1, OVER: 2 };
  let state = STATE.MENU;
  let selected = 0;

  // phase: 'running' | 'closing' | 'quiz' | 'result' | 'opening'
  let phase = "running";
  let transP = 0;             // 0=문 열림, 1=문 닫힘

  let player, obstacles, clouds, terrain;
  let worldOffset, stage, stageTarget, baseSpeed, score, hiScore;
  let nextSpawnX, frame, gameOverAt;
  let confetti = [];
  let resultT = 0, resultCorrect = false, resultText = "";
  let problem = null, quizFrames = 0;

  // sandbox iframe 등에서 localStorage 접근이 막혀도 게임이 죽지 않도록 안전 래핑
  function lsGet(k) { try { return localStorage.getItem(k); } catch (e) { return null; } }
  function lsSet(k, v) { try { localStorage.setItem(k, v); } catch (e) {} }

  hiScore = Number(lsGet("runner_hi2") || 0);

  // ---------- 유틸 ----------
  const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
  const rand = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
  const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];
  const shuffle = (a) => [...a].sort(() => Math.random() - 0.5);

  // ---------- 수학 문제 (쉽구몬수학 app.js 로직 차용) ----------
  function getDivisors(value) {
    const limit = Math.min(9, value);
    const out = [];
    for (let i = 2; i <= limit; i++) if (value % i === 0) out.push(i);
    return out.length ? out : [1];
  }
  function makeProblem(max, operations) {
    const ordered = shuffle(operations);
    let answer = rand(1, max);
    let expr = String(answer);
    ordered.forEach((op) => {
      let operand = 1;
      if (op === "+") { operand = rand(1, max); answer += operand; }
      if (op === "-") { operand = rand(1, Math.max(1, answer)); answer -= operand; }
      if (op === "x") { operand = rand(1, max > 99 ? 9 : max); answer *= operand; }
      if (op === "÷") { const d = getDivisors(answer); operand = d[rand(0, d.length - 1)]; answer /= operand; }
      expr = ordered.length > 1 ? `(${expr} ${op} ${operand})` : `${expr} ${op} ${operand}`;
    });
    return { expression: expr, answer };
  }
  function difficultyFor(s) {
    if (s <= 1) return { ops: ["+"], max: 9, n: 1 };
    if (s === 2) return { ops: ["+", "-"], max: 9, n: 1 };
    if (s === 3) return { ops: ["+", "-"], max: 20, n: 1 };
    if (s === 4) return { ops: ["x"], max: 9, n: 1 };
    if (s === 5) return { ops: ["+", "-"], max: 50, n: 2 };
    if (s === 6) return { ops: ["x", "+"], max: 12, n: 2 };
    if (s === 7) return { ops: ["÷"], max: 81, n: 1 };
    return { ops: ["+", "-", "x", "÷"], max: 20 + s * 4, n: 2 };
  }
  function newProblem(s) {
    const d = difficultyFor(s);
    const ops = Array.from({ length: d.n }, () => pick(d.ops));
    return makeProblem(d.max, ops);
  }

  // ---------- 지형 ----------
  function buildTerrain() {
    terrain = [];
    const amp = Math.min(108, 26 + stage * 12);  // 스테이지가 오를수록 더 가파른 경사
    terrain.push({ x: -300, y: SURFACE_BASE });
    terrain.push({ x: 0, y: SURFACE_BASE });
    terrain.push({ x: 520, y: SURFACE_BASE });  // 출발 평지
    let cx = 520, cy = SURFACE_BASE;
    while (cx < stageTarget - 200) {
      cx += 190 + Math.random() * 170;
      cy += (Math.random() * 2 - 1) * amp;
      cy = clamp(cy, SURFACE_BASE - 98, SURFACE_BASE + 58);
      terrain.push({ x: cx, y: cy });
    }
    terrain.push({ x: stageTarget, y: SURFACE_BASE });       // 도착 평지
    terrain.push({ x: stageTarget + 800, y: SURFACE_BASE });
  }
  function surfaceY(worldX) {
    const t = terrain;
    if (worldX <= t[0].x) return t[0].y;
    for (let i = 1; i < t.length; i++) {
      if (worldX <= t[i].x) {
        const a = t[i - 1], b = t[i];
        const f = (worldX - a.x) / (b.x - a.x);
        return a.y + (b.y - a.y) * f;
      }
    }
    return t[t.length - 1].y;
  }

  // ---------- 스테이지 진행 ----------
  function startStage(n) {
    stage = n;
    stageTarget = 3600 + n * 700;   // 거리 단축 (난이도 완화)
    worldOffset = 0;
    baseSpeed = 4.2 + n * 0.35;      // 1스테이지 살짝 천천히 + 스테이지마다 완만히 ↑
    buildTerrain();
    obstacles = [];
    nextSpawnX = 760;
    player = { footY: SURFACE_BASE, vy: 0, onGround: true, ducking: false };
    transP = 1; phase = "opening";   // 문 열림 연출로 시작
  }
  function resetGame() {
    score = 0; stage = 1; frame = 0;
    clouds = [{ x: 600, y: 55, s: 1 }, { x: 300, y: 90, s: 0.7 }, { x: 750, y: 40, s: 1.2 }];
    confetti = [];
    startStage(1);
  }
  resetGame();

  // ---------- 입력 ----------
  function jump() {
    if (player.onGround) { player.vy = JUMP_V; player.onGround = false; player.ducking = false; }
  }
  function startOrAction() {
    if (state === STATE.MENU) { state = STATE.PLAY; resetGame(); }
    else if (state === STATE.PLAY) { if (phase === "running") jump(); }
    else if (state === STATE.OVER) { if (performance.now() - gameOverAt > 400) { state = STATE.PLAY; resetGame(); } }
  }

  document.addEventListener("keydown", function (e) {
    if (state === STATE.PLAY && phase === "quiz") {
      if (e.key === "Enter") { e.preventDefault(); submitQuiz(quizInput.value); }
      return; // 퀴즈 중엔 입력창에 타이핑 허용
    }
    if (state === STATE.OVER && goVisible) {
      if (goView === "name") {
        if (e.key === "Enter") { e.preventDefault(); submitScore(); }
        return; // 이름 입력 중엔 타이핑 허용
      }
      // 선택/랭킹 화면: 스페이스 / ↑ / ESC → 즉시 다시 시작
      if (e.key === " " || e.key === "Spacebar" || e.key === "ArrowUp" || e.key === "Up" || e.key === "Escape" || e.key === "Esc") {
        e.preventDefault(); restartGame();
      }
      return;
    }
    const k = e.key;
    if (k === " " || k === "ArrowUp" || k === "Spacebar" || k === "Up") { e.preventDefault(); startOrAction(); }
    else if (k === "ArrowDown" || k === "Down") {
      e.preventDefault();
      if (state === STATE.PLAY && phase === "running") {
        if (!player.onGround) player.vy += 6;
        player.ducking = true;
      }
    }
    else if (k === "ArrowLeft" || k === "Left") { if (state === STATE.MENU) selected = (selected - 1 + CHARACTERS.length) % CHARACTERS.length; }
    else if (k === "ArrowRight" || k === "Right") { if (state === STATE.MENU) selected = (selected + 1) % CHARACTERS.length; }
    else if (k === "r" || k === "R") { if (state !== STATE.MENU) { state = STATE.PLAY; resetGame(); } }
    else if (k === "Escape" || k === "Esc") { if (state === STATE.OVER || state === STATE.PLAY) { state = STATE.MENU; } }
  });
  document.addEventListener("keyup", function (e) {
    if (e.key === "ArrowDown" || e.key === "Down") if (player) player.ducking = false;
  });

  function canvasPoint(cx, cy) {
    const r = canvas.getBoundingClientRect();
    return { x: (cx - r.left) * (W / r.width), y: (cy - r.top) * (H / r.height) };
  }
  function cardAt(mx, my) {
    const n = CHARACTERS.length, cw = 130, gap = 20, ch = 110, cardY = 130;
    const startX = (W - (n * cw + (n - 1) * gap)) / 2;
    for (let i = 0; i < n; i++) { const x = startX + i * (cw + gap); if (mx >= x && mx <= x + cw && my >= cardY && my <= cardY + ch) return i; }
    return -1;
  }
  function handleTap(cx, cy) {
    if (state === STATE.PLAY && phase === "quiz") return;
    if (state === STATE.MENU) {
      const p = canvasPoint(cx, cy); const idx = cardAt(p.x, p.y);
      if (idx >= 0) { selected = idx; return; }
      startOrAction();
    } else startOrAction();
  }

  function drawPlayer() {
    const ch = CHARACTERS[selected];
    const color = ch.color, dark = shade(color, 0.68);
    const cx = PLAYER_X + 18;
    const foot = player.footY;
    const ducking = player.ducking && player.onGround;

    if (ducking) {
      // 납작 자세: 길쭉한 몸통 + 짧은 다리 + 앞쪽 머리
      ctx.strokeStyle = dark; ctx.lineWidth = 5; ctx.lineCap = "round";

      ctx.beginPath(); ctx.moveTo(cx - 8, foot - 4); ctx.lineTo(cx - 8 + wob, foot);

    // 2본 관절 다리 (허벅지 + 정강이, 무릎 IK)
    function jointLeg(hx, hy, fx, fy, bend, L1, L2) {
      let dx = fx - hx, dy = fy - hy;
      let d = Math.hypot(dx, dy);
      d = Math.max(Math.abs(L1 - L2) + 0.5, Math.min(L1 + L2 - 0.5, d));
      const a = Math.atan2(dy, dx);
      const cosH = (L1 * L1 + d * d - L2 * L2) / (2 * L1 * d);
      const kAng = a + bend * Math.acos(Math.max(-1, Math.min(1, cosH)));
      const kx = hx + Math.cos(kAng) * L1, ky = hy + Math.sin(kAng) * L1;
      const ex = hx + Math.cos(a) * d, ey = hy + Math.sin(a) * d;
      ctx.strokeStyle = dark; ctx.lineCap = "round";
      ctx.lineWidth = 5; ctx.beginPath(); ctx.moveTo(hx, hy); ctx.lineTo(kx, ky); ctx.stroke();   // 허벅지
      ctx.lineWidth = 4; ctx.beginPath(); ctx.moveTo(kx, ky); ctx.lineTo(ex, ey); ctx.stroke();   // 정강이
      ctx.lineWidth = 5; ctx.beginPath(); ctx.moveTo(ex, ey); ctx.lineTo(ex + 3, ey); ctx.stroke(); // 발
    }

    if (legCount >= 4) {
      // ===== 네발동물: 가로 몸통 + 앞쪽 머리 + 뒤쪽 꼬리 (갤럽) =====
      const bodyW = 46, bodyH = 22, legLen = 18;
      const hipY = foot - legLen;
      const bodyCenterY = hipY - bodyH / 2 + 2;
      const bob = running ? Math.abs(Math.sin(t * 2)) * 2 : 0;
      const frontX = cx + bodyW * 0.26, backX = cx - bodyW * 0.30;
      const gait = (hx, ph) => {
        const c = t + ph, stride = running ? 7 : 1, lift = running ? 11 : 0;
        return [hx + Math.cos(c) * stride, foot - Math.max(0, Math.sin(c)) * lift];
      };
      // 원경(반대쪽) 다리 — 연하게
      ctx.globalAlpha = 0.5;
      let f = gait(backX - 2, Math.PI + 0.6); jointLeg(backX - 2, hipY - bob, f[0], f[1], -1, 9, 10);
      f = gait(frontX - 2, 0.6);              jointLeg(frontX - 2, hipY - bob, f[0], f[1], 1, 9, 9);
      ctx.globalAlpha = 1;
      // 꼬리 (뒤쪽, 살랑)
      const wag = Math.sin(t) * 6;
      ctx.strokeStyle = dark; ctx.lineWidth = 6; ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(cx - bodyW / 2 + 3, bodyCenterY - bob);
      ctx.quadraticCurveTo(cx - bodyW / 2 - 13, bodyCenterY - 12 - bob + wag, cx - bodyW / 2 - 15, bodyCenterY - 26 - bob + wag);
      ctx.stroke();

      ctx.fillStyle = color; fillEllipse(cx, bodyCenterY - bob, bodyW / 2, bodyH / 2);
      ctx.strokeStyle = dark; ctx.lineWidth = 2; ctx.stroke();
      // 머리 (앞쪽)
      drawHead(ch.emoji, cx + bodyW / 2 + 1, bodyCenterY - bob + 9, 30);
      // 근경(이쪽) 다리 — 진하게
      f = gait(backX + 2, Math.PI); jointLeg(backX + 2, hipY - bob, f[0], f[1], -1, 9, 10);
      f = gait(frontX + 2, 0);       jointLeg(frontX + 2, hipY - bob, f[0], f[1], 1, 9, 9);
      return;
    }

    // ===== 외계인: 직립 2족 + 긴 팔 =====
    const legLen = 13, bodyH = 17, bodyW = 22;
    const hipY0 = foot - legLen, bodyTop = hipY0 - bodyH;
    const bob = running ? Math.abs(Math.sin(t)) * 1.5 : 0;
    const hy = hipY0 - bob;
    const gait2 = (hx, ph) => {
      const c = t + ph, stride = running ? 5 : 1, lift = running ? 7 : 0;
      return [hx + Math.cos(c) * stride, foot - Math.max(0, Math.sin(c)) * lift];
    };
    let g1 = gait2(cx - 4, 0), g2 = gait2(cx + 4, Math.PI);
    jointLeg(cx - 4, hy, g1[0], g1[1], -1, 9, 9);
    jointLeg(cx + 4, hy, g2[0], g2[1], -1, 9, 9);
    ctx.fillStyle = color; roundRect(cx - bodyW / 2, bodyTop - bob, bodyW, bodyH, 8); ctx.fill();
    ctx.strokeStyle = dark; ctx.lineWidth = 2; ctx.stroke();
    ctx.strokeStyle = dark; ctx.lineWidth = 4; ctx.lineCap = "round";
    const armY = bodyTop - bob + 6, armLen = 16;
    const aw = running ? Math.sin(t + Math.PI) * 7 : 3;
    ctx.beginPath(); ctx.moveTo(cx + 2, armY); ctx.lineTo(cx + 2 + armLen + aw, armY + 11); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx - 2, armY); ctx.lineTo(cx - 2 - armLen + aw, armY + 11); ctx.stroke();
    drawHead(ch.emoji, cx, bodyTop - bob + 5, 24);
  }
  function drawHUD() {
    ctx.textBaseline = "top";
    // STAGE (좌상단)
    ctx.textAlign = "left"; ctx.fillStyle = "#535353";
    ctx.font = "bold 16px 'Malgun Gothic', sans-serif";
    ctx.fillText(`${CHARACTERS[selected].emoji} STAGE ${stage}`, 14, 12);
    // 진행 바
    const bw = 170, bx = 14, by = 36;
    ctx.fillStyle = "#ddd"; ctx.fillRect(bx, by, bw, 7);
    ctx.fillStyle = "#2e8b57"; ctx.fillRect(bx, by, bw * clamp(worldOffset / stageTarget, 0, 1), 7);
    // 경사 안내 (화면 중앙, 조금 크게) — 살짝 앞을 미리 감지해 일찍 표시
    const ahead = worldOffset + PLAYER_X + 30;
    const slopeD = (surfaceY(ahead + 45) - surfaceY(ahead - 5)) / 50;
    if (Math.abs(slopeD) > 0.05) {
      ctx.textAlign = "center";
      ctx.font = "bold 24px 'Malgun Gothic', sans-serif";
      ctx.fillStyle = slopeD < 0 ? "#d9534f" : "#2e8b57";
      ctx.fillText(slopeD < 0 ? "▲ 오르막 : 느려짐" : "▼ 내리막 : 빨라짐", W / 2, 64);
    }
    // 점수 (우상단, 크고 명확하게)
    ctx.textAlign = "right";
    ctx.font = "bold 13px 'Malgun Gothic', sans-serif"; ctx.fillStyle = "#9a9a9a";
    ctx.fillText("SCORE", W - 16, 8);
    ctx.font = "bold 38px 'Consolas', monospace"; ctx.fillStyle = "#2b2b2b";
    ctx.fillText(String(Math.floor(score)).padStart(5, "0"), W - 16, 21);
    ctx.font = "bold 14px 'Consolas', monospace"; ctx.fillStyle = "#b0b0b0";
    ctx.fillText("HI " + String(hiScore).padStart(5, "0"), W - 16, 64);
  }
  function drawDoors(p) {
    if (p <= 0) return;
    const half = (W / 2) * p;
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, "#54657a"); grad.addColorStop(0.5, "#3e4d60"); grad.addColorStop(1, "#54657a");
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, half, H); ctx.fillRect(W - half, 0, half, H);
    // 패널 줄무늬
    ctx.strokeStyle = "rgba(255,255,255,0.10)"; ctx.lineWidth = 2;
    for (let y = 30; y < H; y += 46) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(half, y); ctx.moveTo(W - half, y); ctx.lineTo(W, y); ctx.stroke();
    }
    // 가운데 이음새 그림자
    ctx.fillStyle = "rgba(0,0,0,0.28)";
    ctx.fillRect(half - 4, 0, 4, H); ctx.fillRect(W - half, 0, 4, H);
    // 살짝 페이드
    ctx.fillStyle = `rgba(10,15,25,${0.18 * p})`; ctx.fillRect(0, 0, W, H);
  }
  function drawResultText() {
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.font = "bold 34px 'Malgun Gothic', sans-serif";
    ctx.fillStyle = resultCorrect ? "#ffd54f" : "#fff";
    ctx.fillText(resultText, W / 2, H / 2 - 6);
    ctx.font = "16px 'Malgun Gothic', sans-serif"; ctx.fillStyle = "rgba(255,255,255,0.9)";
    ctx.fillText("현재 점수 " + String(Math.floor(score)).padStart(5, "0"), W / 2, H / 2 + 30);
  }

  function drawMenu() {
    ctx.textAlign = "center"; ctx.textBaseline = "alphabetic";
    ctx.fillStyle = "#535353"; ctx.font = "bold 32px 'Malgun Gothic', sans-serif";
    ctx.fillText("🏃 런닝구몬", W / 2, 58);
    ctx.font = "bold 13px 'Consolas', monospace"; ctx.fillStyle = "#b0b0b0";
    ctx.fillText("runningoomon", W / 2, 78);
    ctx.font = "15px 'Malgun Gothic', sans-serif"; ctx.fillStyle = "#888";
    ctx.fillText("캐릭터를 선택하세요", W / 2, 100);
    const n = CHARACTERS.length, cw = 130, gap = 20, ch = 110, cardY = 130;
    const startX = (W - (n * cw + (n - 1) * gap)) / 2;
    for (let i = 0; i < n; i++) {
      const x = startX + i * (cw + gap), sel = i === selected;
      ctx.fillStyle = sel ? CHARACTERS[i].color : "#f0f0f0";
      ctx.strokeStyle = sel ? "#333" : "#ccc"; ctx.lineWidth = sel ? 4 : 2;
      roundRect(x, cardY, cw, ch, 14); ctx.fill(); ctx.stroke();
      ctx.font = "54px serif"; ctx.fillStyle = "#000"; ctx.fillText(CHARACTERS[i].emoji, x + cw / 2, cardY + 62);
      ctx.font = "bold 18px 'Malgun Gothic', sans-serif"; ctx.fillStyle = sel ? "#fff" : "#666";
      ctx.fillText(CHARACTERS[i].name, x + cw / 2, cardY + 92);
    }
    ctx.fillStyle = "#535353"; ctx.font = "bold 19px 'Malgun Gothic', sans-serif";
    ctx.fillText("스페이스 또는 클릭으로 시작!", W / 2, 288);
    ctx.font = "13px 'Malgun Gothic', sans-serif"; ctx.fillStyle = "#aaa";
    ctx.fillText("스테이지 클리어마다 수학문제! 맞히면 점수 2배 · 최고 " + String(hiScore).padStart(5, "0"), W / 2, 309);
  }
  function roundRect(x, y, w, h, r) {
    ctx.beginPath(); ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r); ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r); ctx.arcTo(x, y, x + w, y, r); ctx.closePath();
  }

  // ---------- 메인 루프 ----------
  function loop() {
    ctx.clearRect(0, 0, W, H);

    // 터치 오버레이 표시 모드: menu=캐릭터선택 / play=달리는중(점프=탭, 숙이기버튼) / busy=퀴즈·전환 / over=게임오버
    stageEl.dataset.mode = (state === STATE.MENU) ? "menu" : (state === STATE.OVER) ? "over" : (phase === "running") ? "play" : "busy";
    // OVER가 아니면 게임오버 오버레이 정리
    if (state !== STATE.OVER && goVisible) { goBox.classList.remove("show"); goVisible = false; }

    if (state === STATE.MENU) {
      drawSky(); drawTerrain(); drawMenu();
    } else {
      if (state === STATE.PLAY) {
        if (phase === "running") updateRunning();
        else if (phase === "closing") { transP += 1 / CLOSE_FRAMES; if (transP >= 1) { transP = 1; startQuiz(); } }
        else if (phase === "quiz") { quizFrames--; quizTimerEl.textContent = Math.max(0, Math.ceil(quizFrames / 60)); if (quizFrames <= 0) submitQuiz(null); }
        else if (phase === "result") { updateConfetti(); resultT--; if (resultT <= 0) startStage(stage + 1); }
        else if (phase === "opening") { transP -= 1 / OPEN_FRAMES; if (transP <= 0) { transP = 0; phase = "running"; } }
      }

      drawSky(); drawTerrain();
      for (const o of obstacles) drawObstacle(o);
      drawPlayer();
      drawHUD();

      if (phase !== "running") drawDoors(transP);
      if (phase === "result") { drawResultText(); drawConfetti(); }
      // 게임오버 화면은 DOM 오버레이(#gameover)로 표시
    }
    requestAnimationFrame(loop);
  }

  // ---------- 고해상도 렌더링 (선명도 개선) ----------
  // 로직 좌표는 800x320 그대로 두고, 백킹 버퍼만 디스플레이 크기×픽셀비율로 키운다.
  const MAX_BACKING_W = 2400;
  function fitCanvas() {
    const cssW = canvas.clientWidth || W;
    let bw = Math.min(cssW * (window.devicePixelRatio || 1), MAX_BACKING_W);
    bw = Math.max(bw, W);
    canvas.width = Math.round(bw);
    canvas.height = Math.round(bw * H / W);
    ctx.setTransform(canvas.width / W, 0, 0, canvas.height / H, 0, 0); // 로직 좌표(0..800,0..320) → 백킹
    ctx.imageSmoothingEnabled = true;
  }
  window.addEventListener("resize", fitCanvas);
  fitCanvas();
  loop();
})();
</script>
</body>
</html>
